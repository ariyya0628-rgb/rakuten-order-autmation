name: rms-sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run RMS ledger sync
        env:
          RMS_SERVICE_SECRET: ${{ secrets.RMS_SERVICE_SECRET }}
          RMS_LICENSE_KEY: ${{ secrets.RMS_LICENSE_KEY }}
          GOOGLE_SHEETS_ACCESS_TOKEN: ${{ secrets.GOOGLE_SHEETS_ACCESS_TOKEN }}
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
          RMS_API_BASE: https://api.rms.rakuten.co.jp
          GOOGLE_SHEETS_API_BASE: https://sheets.googleapis.com/v4
        run: python rms_ledger_sync.py

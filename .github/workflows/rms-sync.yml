name: rms-sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Add RMS getOrder version
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('rms_ledger_sync.py')
          text = path.read_text(encoding='utf-8')
          old = '{"orderNumberList": order_numbers[index : index + 100]}'
          new = '{"orderNumberList": order_numbers[index : index + 100], "version": 7}'
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
          python -m py_compile rms_ledger_sync.py

      - name: Run RMS ledger sync
        env:
          RMS_SERVICE_SECRET: ${{ secrets.RMS_SERVICE_SECRET }}
          RMS_LICENSE_KEY: ${{ secrets.RMS_LICENSE_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID || '1wOqqEtElzHyxOQLfmGcjbqNxQXWcJmtNOxJwk5s2M_o' }}
          RMS_API_BASE: https://api.rms.rakuten.co.jp
          GOOGLE_SHEETS_API_BASE: https://sheets.googleapis.com/v4
        run: python rms_ledger_sync.py
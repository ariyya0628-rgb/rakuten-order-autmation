name: validate

on:
  push:
  pull_request:

jobs:
  py_compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compile runner
        run: python -m py_compile rms_ledger_sync.py
